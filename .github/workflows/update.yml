name: worldcup-calendar-update

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: install deps
        run: pip install requests ics

      - name: run script
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: python generate_calendar.py

      - name: commit
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add worldcup2026.ics
          git commit -m "update" || echo "no changes"
          git push
